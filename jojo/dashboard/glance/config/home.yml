- name: Home
  head-widgets:
    - $include: widgets/proxmox-ve-nodes.yml
  width: default
  hide-desktop-navigation: false
  center-vertically: false
  columns:
    - size: full
      widgets:
        - type: monitor
          cache: 1m
          title: Services
          sites:
            - title: Proxmox
              url: https://j2-pve.taild278ce.ts.net:8006
              check-url: https://192.168.1.50:8006
              allow-insecure: true
              icon: di:proxmox
            - title: Dockhand
              url: http://10.10.1.201:3000
              icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/png/dockhand.png
            - title: Karakeep
              url: http://10.10.1.200:3000
              icon: di:karakeep
            - title: Memos
              url: http://10.10.1.202:5230
              icon: di:memos
            - title: IT Tools
              url: http://10.10.1.202:80
              icon: https://cdn.jsdelivr.net/gh/homarr-labs/dashboard-icons/svg/it-tools-light.svg

        - type: monitor
          cache: 1m
          title: Media
          sites:
            - title: Qui
              url: http://10.10.1.200:7476
              icon: di:qui
            - title: Qbittorrent
              url: http://10.10.1.200:8080
              icon: di:qbittorrent
            - title: Nzbget
              url: http://10.10.1.200:6789
              icon: di:nzbget
              alt-status-codes:
                - 401
                - 403
            - title: Prowlarr
              url: http://10.10.1.200:9696
              icon: di:prowlarr
            - title: Sonarr
              url: http://10.10.1.200:8989
              icon: di:sonarr
            - title: Radarr
              url: http://10.10.1.200:7878
              icon: di:radarr
            - title: Lidarr
              url: http://10.10.1.200:8686
              icon: di:lidarr
            - title: Bazarr
              url: http://10.10.1.200:6767
              icon: di:bazarr

        - $include: widgets/proxmox-ve-stats.yml
        - $include: widgets/proxmox-detailed-stats.yml

    - size: small
      widgets:
        - type: clock
          hour-format: 12h
          timezones:
            - timezone: UTC
              label: UTC
            - timezone: Australia/Melbourne
              label: Melbourne
            - timezone: America/New_York
              label: New York
            - timezone: Asia/Tokyo
              label: Tokyo

        - $include: widgets/tailscale-devices.yml

        - type: group
          define: &shared-properties
            type: repository
            pull-requests-limit: 5
            commits-limit: 3
            token: ${GITHUB_REPO_TOKEN}
          widgets:
            - repository: 0xKahi/j2-homelab
              title: j2-homelab
              <<: *shared-properties
            - repository: 0xKahi/dotfiles
              title: dotfiles
              <<: *shared-properties

        - type: releases
          cache: 1d
          show-source-icon: true
          repositories:
            - anomalyco/opencode
            - code-yeongyu/oh-my-openagent
            - glanceapp/glance
            - 0xKahi/ocp
